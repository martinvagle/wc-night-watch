<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Night Watch · World Cup wake-up planner (SGT)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');
:root{
  --mid:#080d1b; --mid2:#0c1226; --panel:#111a36; --panel2:#16203f; --line:#243259;
  --ice:#e8eefb; --dim:#9db0d6; --faint:#6b7da6;
  --red:#ef2b2d; --red2:#9d1424; --amber:#f4ad3e; --amber2:#7a5618; --blue:#5d8ff0; --frost:#4fd6ac;
  --nred:#ef2b2d; --nblue:#0a3aa3; --nink:#00205b;   /* Norwegian flag palette */
  --disp:'Anton',Impact,sans-serif; --head:'Archivo',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  font-family:var(--body); color:var(--ice); line-height:1.5; overflow-x:hidden;
  background:var(--mid);
  background-image:radial-gradient(1300px 640px at 78% -8%, #16224a 0%, var(--mid2) 46%, var(--mid) 100%);
  background-attachment:fixed;
}
.nw-aurora{position:fixed;top:0;left:0;right:0;height:380px;z-index:0;pointer-events:none;
  background:radial-gradient(620px 240px at 12% 0%, rgba(239,43,45,.16), transparent 70%),
             radial-gradient(760px 260px at 66% 0%, rgba(10,58,163,.18), transparent 70%),
             radial-gradient(520px 220px at 92% 8%, rgba(255,255,255,.06), transparent 70%);
  filter:blur(4px);}
.nw-wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:22px clamp(14px,3vw,34px) 60px}

/* header */
.nw-head{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.nw-brand{display:flex;align-items:center;gap:13px}
.nw-moon{display:grid;place-items:center;width:44px;height:44px;border-radius:13px;background:linear-gradient(160deg,#1c2a52,#0f1830);border:1px solid var(--line);color:#cdd9f5;box-shadow:0 0 22px rgba(93,143,240,.25)}
.nw-brand h1{font-family:var(--disp);font-size:clamp(28px,4.8vw,44px);letter-spacing:.04em;margin:0;line-height:.92}
.nw-brand p{margin:3px 0 0;color:var(--dim);font-size:12.5px}
.nw-controls{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.nw-select span{display:block;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;margin:0 0 5px 3px}
.nw-select-box{position:relative;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:0 34px 0 11px;height:44px}
.nw-select-box:focus-within{border-color:var(--blue)}
.nw-flag{font-size:18px;line-height:1}
.nw-select select{appearance:none;background:transparent;border:0;color:var(--ice);font-family:var(--head);font-weight:700;font-size:14.5px;height:100%;padding-right:4px;outline:none;cursor:pointer;max-width:52vw}
.nw-select option,.nw-select optgroup{background:var(--mid2);color:var(--ice)}
.nw-chev{position:absolute;right:11px;color:var(--dim);pointer-events:none;display:flex}
.nw-asof{font-size:12.5px;color:var(--dim);margin:6px 0 18px;max-width:780px}
.nw-asof em{color:var(--frost);font-style:normal;font-weight:600}.nw-asof strong{color:var(--ice)}
.nw-live{display:inline-flex;align-items:center;gap:6px;background:rgba(79,214,172,.14);border:1px solid rgba(79,214,172,.4);color:var(--frost);font-weight:700;font-size:11px;letter-spacing:.04em;padding:2px 9px;border-radius:999px;margin-right:8px}

/* hero */
.nw-hero{background:linear-gradient(165deg,var(--panel),var(--mid2));border:1px solid var(--line);border-radius:20px;padding:clamp(16px,2.6vw,26px);margin-bottom:22px;box-shadow:0 24px 60px -30px rgba(0,0,0,.7)}
.nw-hero-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--head);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);background:rgba(236,28,52,.12);border:1px solid rgba(236,28,52,.3);padding:5px 10px;border-radius:999px;margin-bottom:16px}
.nw-hero.solo .nw-hero-tag{color:#cfe0ff;background:rgba(93,143,240,.12);border-color:rgba(93,143,240,.3)}
.nw-hero-vs{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.nw-big-flag{font-size:clamp(34px,6vw,50px);line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}
.nw-vs-mid{flex:1;min-width:0}
.nw-vs{display:block;font-family:var(--disp);font-size:clamp(22px,4vw,34px);letter-spacing:.02em;line-height:1}
.nw-vs i{color:var(--faint);font-size:.6em;margin:0 .25em;vertical-align:.12em;font-style:normal}
.nw-vs-when{display:inline-flex;align-items:center;gap:6px;color:var(--dim);font-size:13px;margin-top:6px}
.nw-vs-when b{color:var(--amber);font-family:var(--mono)}
.nw-hero-lead{color:#cdd9f1;font-size:14.5px;max-width:780px;margin:0}
.nw-hero-lead b{color:var(--ice);font-weight:600}
.nw-fork{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:20px}
.nw-fork-col{border-radius:15px;padding:15px 15px 13px;border:1px solid var(--line);background:var(--panel2);position:relative;overflow:hidden}
.nw-fork-col.win{border-color:rgba(236,28,52,.4);background:linear-gradient(165deg,rgba(236,28,52,.13),var(--panel2))}
.nw-fork-col.lose{border-color:rgba(244,173,62,.34);background:linear-gradient(165deg,rgba(244,173,62,.1),var(--panel2))}
.nw-fork-h{display:flex;align-items:center;gap:8px;font-family:var(--head);font-weight:800;font-size:14px;letter-spacing:.02em;text-transform:uppercase}
.nw-fork-h .dot{width:9px;height:9px;border-radius:50%}
.win .nw-fork-h .dot{background:var(--red);box-shadow:0 0 10px var(--red)}
.lose .nw-fork-h .dot{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.nw-fork-prob{font-family:var(--disp);font-size:34px;line-height:1;margin:8px 0 11px}
.nw-fork-prob small{font-family:var(--body);font-size:11px;color:var(--faint);margin-left:8px;letter-spacing:.04em;vertical-align:.5em}
.win .nw-fork-prob{color:#ff7585}.lose .nw-fork-prob{color:var(--amber)}
.nw-fork-col ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.nw-fork-col li{display:flex;gap:8px;align-items:flex-start;font-size:12.8px;color:#cdd9f1}
.nw-fork-col li .ic{flex:none;margin-top:2px;color:var(--dim);display:flex}
.nw-fork-col li b{color:var(--ice);font-weight:600}
.nw-decider{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}
.nw-decider>span{font-size:12.5px;color:var(--dim)}
.nw-deciderbtns{display:flex;gap:8px;flex-wrap:wrap}
.nw-deciderbtns button{font-family:var(--head);font-weight:600;font-size:13px;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--ice);cursor:pointer;transition:.15s}
.nw-deciderbtns button:hover{border-color:var(--blue)}
.nw-deciderbtns button.on.win{background:var(--red);border-color:var(--red);color:#fff}
.nw-deciderbtns button.on.lose{background:var(--amber);border-color:var(--amber);color:#221603}
.nw-deciderbtns button.ghost{background:transparent;color:var(--faint);border-style:dashed}

/* rails */
.nw-rails{display:flex;flex-direction:column;gap:18px;margin-bottom:24px}
.rail{background:linear-gradient(180deg,var(--panel),var(--mid2));border:1px solid var(--line);border-radius:18px;padding:15px clamp(12px,2vw,18px) 17px}
.rail.red{border-top:3px solid var(--red)}.rail.amber{border-top:3px solid var(--amber)}
.rail-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:13px}
.rail-title{font-family:var(--head);font-weight:800;font-size:16px;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
.rail-title em{font-style:normal;font-weight:500;font-size:12.5px;color:var(--dim);letter-spacing:0}
.rail-pip{width:11px;height:11px;border-radius:3px}
.red .rail-pip{background:var(--red);box-shadow:0 0 10px var(--red)}.amber .rail-pip{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.rail-odds{font-size:12.5px;color:var(--dim);display:flex;align-items:center;gap:6px}
.rail-odds b{font-family:var(--mono);color:var(--frost);font-size:14px}
.rail-track{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(172px,1fr);gap:11px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin}
.rail-track::-webkit-scrollbar{height:7px}.rail-track::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}

/* station */
.stn{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:11px 11px 10px;display:flex;flex-direction:column;gap:8px;min-width:0;transition:.18s;position:relative}
.stn.soft{opacity:.92}
.stn.dead{opacity:.34;filter:grayscale(.6)}
.stn.adv{border-color:rgba(79,214,172,.5);box-shadow:inset 0 0 0 1px rgba(79,214,172,.2)}
.stn.lost{border-color:rgba(236,28,52,.5)}
.stn-top{display:flex;justify-content:space-between;align-items:center}
.stn-round{font-family:var(--disp);font-size:13px;letter-spacing:.08em;color:var(--faint)}
.stn-flag{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
.stn-flag.lk{background:rgba(79,214,172,.14);color:var(--frost)}
.stn-flag.bn{background:rgba(157,176,214,.12);color:var(--dim)}
.stn-flag.advf{background:rgba(79,214,172,.2);color:var(--frost);display:inline-flex;align-items:center;gap:3px}
.stn-flag.out{background:rgba(236,28,52,.2);color:#ff8a96}
.stn-time{font-family:var(--disp);font-size:28px;line-height:.95;letter-spacing:.01em;color:#fff;white-space:nowrap}
.stn.blue .stn-time,.stn.frost .stn-time{color:var(--ice)}
.stn-date{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px}

/* night dial */
.dial{position:relative;height:20px;margin:1px 0 2px}
.dial-track{position:absolute;top:6px;left:0;right:0;height:5px;border-radius:99px;
  background:linear-gradient(90deg,#0a1226 0%,#0a1226 25%, #243a6b 38%, #4a6196 50%, #243a6b 62%, #0a1226 75%, #0a1226 100%)}
.dial-dot{position:absolute;top:3px;width:11px;height:11px;border-radius:50%;transform:translateX(-50%);border:2px solid #0c1226}
.dial-dot[data-tone="red"]{background:var(--red);box-shadow:0 0 10px var(--red)}
.dial-dot[data-tone="amber"]{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.dial-dot[data-tone="blue"]{background:var(--blue);box-shadow:0 0 9px var(--blue)}
.dial-dot[data-tone="frost"]{background:var(--frost);box-shadow:0 0 9px var(--frost)}
.dial-ticks{position:absolute;top:13px;left:0;right:0;display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;color:#46577e}

/* opponent + prob */
.stn-opp{display:flex;align-items:center;gap:7px;margin-top:3px}
.stn-flagimg{font-size:18px;line-height:1;flex:none}
.stn-oppname{font-family:var(--head);font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stn-prob{display:flex;align-items:center;gap:8px}
.stn-bar{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.stn-bar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--frost))}
.stn-pct{font-family:var(--mono);font-weight:700;font-size:12.5px;color:var(--ice);min-width:34px;text-align:right}
.stn-sleep{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 0}
.stn.red .stn-sleep{color:#ff8a96}.stn.amber .stn-sleep{color:var(--amber)}.stn.blue .stn-sleep{color:#9cc0ff}.stn.frost .stn-sleep{color:var(--frost)}
.stn-venue{font-size:10.5px;color:var(--faint)}
.stn-mark{display:flex;gap:6px;margin-top:3px}
.stn-mark button{flex:1;font-size:11px;font-weight:600;padding:5px 0;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;transition:.13s}
.stn-mark button:hover{border-color:var(--blue);color:var(--ice)}
.stn-mark button.on.w{background:var(--frost);border-color:var(--frost);color:#06231a}
.stn-mark button.on.l{background:var(--red);border-color:var(--red);color:#fff}

/* sleep plan */
.nw-sleep{margin-bottom:24px}
.nw-sleep h2{font-family:var(--head);font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px;margin:0 0 6px}
.nw-sleep-lead{font-size:12.5px;color:var(--dim);margin:0 0 14px}
.chip{font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;letter-spacing:.04em}
.chip.locked{background:rgba(79,214,172,.16);color:var(--frost)}.chip.bonus{background:rgba(157,176,214,.14);color:var(--dim)}
.nw-sleep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.slp{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:14px 15px}
.slp h3{font-family:var(--head);font-weight:700;font-size:14px;margin:0 0 11px;color:var(--ice)}
.slp ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.slp-row{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:11px;background:var(--panel2);border-left:3px solid var(--line)}
.slp-row.red{border-left-color:var(--red)}.slp-row.amber{border-left-color:var(--amber)}.slp-row.blue{border-left-color:var(--blue)}.slp-row.frost{border-left-color:var(--frost)}
.slp-date{display:flex;flex-direction:column;align-items:center;min-width:46px}
.slp-day{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase}
.slp-dt{font-family:var(--disp);font-size:17px;line-height:1;color:var(--ice)}
.slp-mid{flex:1;min-width:0}
.slp-match{font-family:var(--head);font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slp-sub{font-size:11.5px;color:var(--dim);margin-top:2px}
.slp-tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:999px;flex:none}
.slp-tag.lk{background:rgba(79,214,172,.16);color:var(--frost)}.slp-tag.bn{background:rgba(157,176,214,.13);color:var(--dim)}

/* tools */
.nw-tools{margin-bottom:8px}
.nw-acc{display:inline-flex;align-items:center;gap:9px;font-family:var(--head);font-weight:600;font-size:13.5px;color:var(--ice);background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 15px;cursor:pointer;transition:.15s}
.nw-acc:hover{border-color:var(--blue)}
.nw-acc .rot{transform:rotate(180deg)}.nw-acc .ic{transition:.2s;display:flex}
.nw-ratings{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px}
.nw-ratings>p{font-size:12.5px;color:var(--dim);margin:0 0 13px}
.nw-ratings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:8px}
.nw-rat{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:6px 8px 6px 10px}
.nw-rat span{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nw-rat input{width:62px;background:var(--mid2);border:1px solid var(--line);border-radius:6px;color:var(--ice);font-family:var(--mono);font-size:12px;padding:4px 6px;text-align:right}
.nw-rat input:focus{outline:none;border-color:var(--blue)}
.nw-reset{margin-top:14px;font-size:12.5px;color:#ff8a96;background:transparent;border:1px dashed rgba(236,28,52,.4);border-radius:9px;padding:8px 14px;cursor:pointer}
.nw-reset:hover{background:rgba(236,28,52,.08)}

/* footer */
.nw-foot{margin-top:26px;border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:9px}
.nw-foot p{font-size:12px;color:var(--dim);margin:0;max-width:900px}
.nw-foot b{color:var(--ice);font-weight:600}
.nw-fine{color:var(--faint)!important;font-size:11.5px!important}

/* next-match card */
.nw-hero.solo .nw-hero-tag,.nw-hero.next .nw-hero-tag,.nw-hero.out .nw-hero-tag,.nw-hero.champ .nw-hero-tag{color:#cfe0ff;background:rgba(93,143,240,.12);border-color:rgba(93,143,240,.3)}
.nw-hero.champ .nw-hero-tag{color:var(--amber);background:rgba(244,173,62,.12);border-color:rgba(244,173,62,.3)}
.nw-next{display:flex;align-items:center;gap:16px}
.nw-next .nw-vs i{color:var(--faint);font-size:.6em;margin:0 .25em;vertical-align:.12em}
.nw-proj{font-size:.5em;color:var(--faint);font-family:var(--body);letter-spacing:0;vertical-align:.2em}
.nw-next-meta{display:flex;gap:13px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.nw-next-stat{display:flex;flex-direction:column;justify-content:center;min-width:92px}
.nw-next-pct{font-family:var(--disp);font-size:38px;line-height:1;color:#fff}
.nw-next-stat small{font-size:11px;color:var(--faint);letter-spacing:.04em;margin-top:3px}
.nw-next-sleep{display:flex;align-items:center;gap:10px;flex:1;min-width:210px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
.nw-next-sleep .ic{flex:none;color:var(--dim)}
.nw-next-sleep div{display:flex;flex-direction:column;min-width:0}
.nw-next-sleep b{font-size:13.5px}
.nw-next-sleep span{font-size:11.5px;color:var(--dim)}
.nw-next-sleep.red{border-color:rgba(236,28,52,.4)}.nw-next-sleep.red b{color:#ff8a96}.nw-next-sleep.red .ic{color:#ff8a96}
.nw-next-sleep.amber{border-color:rgba(244,173,62,.34)}.nw-next-sleep.amber b{color:var(--amber)}.nw-next-sleep.amber .ic{color:var(--amber)}
.nw-next-sleep.blue b{color:#9cc0ff}.nw-next-sleep.frost{border-color:rgba(79,214,172,.34)}.nw-next-sleep.frost b{color:var(--frost)}.nw-next-sleep.frost .ic{color:var(--frost)}

/* forward projection road */
.nw-road{margin:0}
.nw-road h2{font-family:var(--head);font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;margin:20px 0 6px}
.nw-road-lead{font-size:12.5px;color:var(--dim);margin:0 0 14px;max-width:840px}
.nw-road-lead b{color:var(--ice);font-weight:600}
.road-list{display:flex;flex-direction:column;gap:8px}
.road-step{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 13px}
.road-rd{font-family:var(--disp);font-size:14px;color:var(--faint);min-width:44px;letter-spacing:.06em}
.road-opp{flex:1;min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.road-fl{font-size:18px;flex:none}
.road-on{font-family:var(--head);font-weight:600;font-size:13.5px}
.road-when{font-family:var(--mono);font-size:10.5px;color:var(--faint);width:100%;margin-left:26px}
.road-num{text-align:right;min-width:64px}
.road-num b{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--ice);display:block;line-height:1.1}
.road-num small{font-size:9.5px;color:var(--faint);letter-spacing:.02em}
.road-num.cum b{color:var(--frost)}
.road-foot{margin-top:13px;font-size:13px;color:var(--dim);display:flex;align-items:center;gap:8px;border-top:1px solid var(--line);padding-top:13px;flex-wrap:wrap}
.road-foot b{font-family:var(--mono);color:var(--frost);font-size:17px}
.road-foot span{color:var(--faint);font-size:11.5px}

/* bracket tree */
.nw-bracket{margin:28px 0 8px}
.nw-bracket h2{font-family:var(--head);font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px;margin:0 0 6px}
.nw-bracket-lead{font-size:12.5px;color:var(--dim);margin:0 0 14px;max-width:860px}
.nw-bracket-lead b{color:var(--ice);font-weight:600}
.bk-scroll{overflow-x:auto;padding-bottom:10px;scrollbar-width:thin}

      '<div class="nw-next"><span class="nw-big-flag" style="filter:grayscale(1);opacity:.55">'+t.f+'</span>'+
      '<div class="nw-vs-mid"><span class="nw-vs">'+esc(t.n)+' — Out</span>'+
      '<span class="nw-vs-when">'+I("flag",14)+' Lost to '+flagOf(info.by)+' '+esc(nameOf(info.by))+' in the '+ROUND_SHORT[sl.round]+'</span></div></div></section>';
  }
  if(info.status==="out-group"){
    return '<section class="nw-hero solo out">'+tag+
      '<p class="nw-hero-lead">'+esc(t.n)+' did not reach the knockout stage.</p></section>';
  }
  var sl=SLOTS[info.m], s=fmtSGT(sl.utc), v=sleepVerdict(s.hour);
  var wp=Math.round(winProb(code, info.opp)*100);
  var oppName=esc(nameOf(info.opp))+(info.confirmed?"":' <span class="nw-proj">(projected)</span>');
  return '<section class="nw-hero solo next'+nor+'">'+tag+
    '<div class="nw-next">'+
      '<span class="nw-big-flag">'+t.f+'</span>'+
      '<div class="nw-vs-mid"><span class="nw-vs">'+esc(t.n)+' <i>vs</i> '+oppName+'</span>'+
        '<span class="nw-vs-when">'+I("cal",14)+' '+ROUND_SHORT[sl.round]+' · <b>'+s.time+'</b> '+s.weekday+' '+s.date+' SGT · '+esc(sl.venue)+'</span></div>'+
      '<span class="nw-big-flag">'+flagOf(info.opp)+'</span>'+
    '</div>'+
    '<div class="nw-next-meta">'+
      '<div class="nw-next-stat"><span class="nw-next-pct">'+wp+'%</span><small>win chance</small></div>'+
      '<div class="nw-next-sleep '+v.tone+'">'+I(v.icon,16)+'<div><b>'+v.tag+'</b><span>'+v.blurb+'</span></div></div>'+
    '</div></section>';
}

/* ---------------- full bracket tree (always shown) ---------------- */
var BK_COLS=[
  {label:"Round of 32",    ms:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]},
  {label:"Round of 16",    ms:[89,90,91,92,93,94,95,96]},
  {label:"Quarter-finals", ms:[97,98,99,100]},
  {label:"Semi-finals",    ms:[101,102]},
  {label:"Final",          ms:[103]}
];
function bracketMatchHTML(m){
  var sl=SLOTS[m], t=slotTeams(m), dec=state.results[m], s=fmtSGT(sl.utc), v=sleepVerdict(s.hour);
  var sel=state.team, involves=(t[0]===sel||t[1]===sel);
  var proj=!slotConfirmed(m) && !dec;
  function row(code){
    if(!code) return '<div class="bk-row tbd"><span class="bk-cd">TBD</span></div>';
    var win=dec===code, lose=dec&&dec!==code, me=code===sel;
    return '<div class="bk-row'+(win?' win':'')+(lose?' lose':'')+(me?' me':'')+'">'+
      '<span class="bk-fl">'+flagOf(code)+'</span><span class="bk-cd">'+esc(code)+'</span>'+
      (win?'<span class="bk-chk">'+I("check",11)+'</span>':'')+'</div>';
  }
  return '<div class="bk-match'+(involves?' hot':'')+(proj?' proj':'')+'">'+
    '<div class="bk-when"><span class="bk-dot" data-tone="'+v.tone+'"></span>'+s.time+' · '+s.weekday+' '+s.date+'</div>'+
    row(t[0])+row(t[1])+'</div>';
}
function bracketHTML(){
  var cols=BK_COLS.map(function(c){
    var cells=c.ms.map(function(m){ return '<div class="bk-cell">'+bracketMatchHTML(m)+'</div>'; }).join("");
    return '<div class="bk-round"><div class="bk-rhead">'+c.label+'</div><div class="bk-col">'+cells+'</div></div>';
  }).join("");
  return '<section class="nw-bracket"><h2>'+I("trophy",18)+' Full bracket · all times SGT</h2>'+
    '<p class="nw-bracket-lead">Every knockout tie with its kickoff and a <b>sleep tint</b>. Confirmed winners fill in live as games finish; ties still to come show the model favourite in muted text. <b>'+esc((TEAMS[state.team]||{}).n||state.team)+'</b> is highlighted — scroll sideways for the later rounds.</p>'+
    '<div class="bk-scroll"><div class="bk'+(state.team==="NOR"?" nor":"")+'">'+cols+'</div></div></section>';
}

/* ---------------- forward projection: the chosen team's road ---------------- */
function pct(x){ var p=x*100; if(p>=10) return Math.round(p)+"%"; if(p>=1) return p.toFixed(1)+"%"; return p.toFixed(2)+"%"; }
function teamRoad(code){
  var m=teamR32Slot(code); if(!m) return null;
  var road=[], cum=1, from=null;
  while(m){
    var dec=state.results[m];
    if(dec!=null){ if(dec!==code) return {eliminated:true}; from=m; m=PARENT[m]; continue; }
    // opponent comes from the OTHER side of this tie (assume `code` itself advances)
    var opp;
    if(SLOTS[m].round==="R32"){ var t=slotTeams(m); opp=(t[0]===code?t[1]:t[0]); }
    else { var a=SLOTS[m].a.m, b=SLOTS[m].b.m; opp=winnerOf(a===from?b:a); }
    if(!opp) break;
    var p=winProb(code,opp);
    road.push({m:m, round:SLOTS[m].round, opp:opp, confirmed:slotConfirmed(m), win:p, cum:cum*p});
    cum*=p;
    from=m; var par=PARENT[m]; if(!par) break; m=par;
  }
  return {eliminated:false, road:road, champ:cum};
}
function roadHTML(){
  var code=state.team, r=teamRoad(code);
  if(!r || r.eliminated || !r.road.length) return "";
  var t=TEAMS[code]||{n:code};
  var steps=r.road.map(function(st){
    var s=fmtSGT(SLOTS[st.m].utc);
    return '<div class="road-step">'+
      '<div class="road-rd">'+ROUND_SHORT[st.round]+'</div>'+
      '<div class="road-opp"><span class="road-fl">'+flagOf(st.opp)+'</span>'+
        '<span class="road-on">'+esc(nameOf(st.opp))+(st.confirmed?'':' <span class="nw-proj">proj.</span>')+'</span>'+
        '<span class="road-when">'+s.time+' · '+s.weekday+' '+s.date+' SGT</span></div>'+
      '<div class="road-num"><b>'+Math.round(st.win*100)+'%</b><small>win this tie</small></div>'+
      '<div class="road-num cum"><b>'+pct(st.cum)+'</b><small>still in after</small></div>'+
    '</div>';
  }).join("");
  return '<section class="nw-road">'+
    '<h2>'+I("swords",17)+' '+esc(t.n)+'’s road from here</h2>'+
    '<p class="nw-road-lead">Each round shows the projected opponent (the favourite from the other side of that tie). <b>Win this tie</b> is the one-off chance of that single game; <b>still in after</b> compounds them — a 40% game then a 35% game leaves only ~14% of surviving both. That’s why the deep run is always far longer odds than any one match looks.</p>'+
    '<div class="road-list">'+steps+'</div>'+
    '<div class="road-foot">'+I("trophy",15)+' '+esc(t.n)+' win it all from here: <b>'+pct(r.champ)+'</b> <span>— assuming the favourite wins every other tie on the way</span></div>'+
  '</section>';
}

function renderDyn(){
  sanitizeResults();
  document.getElementById("dyn").innerHTML = heroHTML() + roadHTML();
  var b=document.getElementById("bracket"); if(b) b.innerHTML = bracketHTML();
}
function renderPanel(){
  var wrap=document.getElementById("ratingsWrap");
  if(!state.openRatings){ wrap.innerHTML=""; return; }
  var codes=Object.keys(TEAMS).sort(function(a,b){return ratingOf(b)-ratingOf(a);});
  var rows=codes.map(function(c){ return '<label class="nw-rat"><span>'+TEAMS[c].f+' '+esc(TEAMS[c].n)+'</span>'+
    '<input class="nw-rat-input" type="number" step="5" value="'+ratingOf(c)+'" data-code="'+c+'"></label>'; }).join("");
  wrap.innerHTML = '<div class="nw-ratings"><p>Nudge any rating (Elo-style) to bend the odds toward your own read — injuries, form, gut feel. Higher = stronger.</p>'+
    '<div class="nw-ratings-grid">'+rows+'</div>'+
    '<button class="nw-reset" data-act="reset-all">Reset everything</button></div>';
}

/* ---------------- shell + events ---------------- */
function selectOptions(){
  var opts="";
  Object.keys(GROUP_SEEDS).forEach(function(g){
    opts += '<optgroup label="Group '+g+'">';
    var picks = GROUP_SEEDS[g].slice(0,2);
    if(THIRD_QUAL.indexOf(g)>=0 && GROUP_SEEDS[g][2]) picks.push(GROUP_SEEDS[g][2]);
    picks.forEach(function(c, idx){ if(!TEAMS[c]) return; opts += '<option value="'+c+'">'+TEAMS[c].f+' '+TEAMS[c].n+(idx===2?' · 3rd (proj.)':'')+'</option>'; });
    opts += '</optgroup>';
  });
  return opts;
}
function rebuildSelect(){
  var sel=document.getElementById("teamSelect"); if(!sel) return;
  var cur=state.team; sel.innerHTML=selectOptions(); sel.value=cur;
}
function buildShell(){
  document.getElementById("app").innerHTML =
    '<header class="nw-head">'+
      '<div class="nw-brand"><span class="nw-brand-flag">'+NORFLAG(30)+'</span>'+
        '<div><h1>NIGHT&nbsp;WATCH</h1><p>World Cup wake-up planner · all times Singapore (SGT)</p>'+
        '<span class="nw-heia">'+NORFLAG(18)+' Heia Norge</span></div></div>'+
      '<div class="nw-controls"><label class="nw-select"><span>Following</span>'+
        '<div class="nw-select-box"><span class="nw-flag" id="brandFlag"></span>'+
          '<select id="teamSelect">'+selectOptions()+'</select><span class="nw-chev">'+I("chevron",16)+'</span></div></label></div>'+
    '</header>'+
    '<div class="nw-asof"><span id="livePill" class="nw-live" style="display:none"></span>Group stage <strong>complete</strong> — the knockouts are underway. Results fill in <em>live</em> from the market; past a team\'s next game, opponents are the model favourite. All times SGT.</div>'+
    '<div id="dyn"></div>'+
    '<section class="nw-tools"><button class="nw-acc" data-act="toggle-ratings">'+I("shield",15)+' Tune team strength '+I("chevron",15)+'</button><div id="ratingsWrap"></div></section>'+
    '<div id="bracket"></div>'+
    '<footer class="nw-foot">'+
      '<p><b>How the numbers work.</b> Win chances come from rating gaps (logistic / Elo). Projected opponents are the favourite of each opposing bracket region — they get fuzzier deeper in, so treat semi/final names as placeholders. With <code>wc-data.json</code> present, ratings are calibrated to live market title odds.</p>'+
      '<p><b>Keeping it current.</b> Results come from the betting market — when a team is priced at essentially 100% to reach the next round, it has won, and the bracket fills in automatically. The <code>wc-data.json</code> next to this file (written by <code>wc_sync.py</code>) refreshes on a schedule and auto-loads on open. To put this online, drop both files on any static host (GitHub Pages, Netlify drop, Vercel).</p>'+
      '<p class="nw-fine">Times converted from FIFA\'s published ET (EDT, UTC−4) to SGT (UTC+8). Group seeds are projected where the group stage hasn\'t finished. Market data is used as a probability signal only — not betting advice. Heia Norge. 🇳🇴</p>'+
    '</footer>';
}

function setTeam(code){
  state.team=code; state.groupResult=null;
  var g=teamGroupPos(code); state.posView = g?g.pos:2;
  document.getElementById("brandFlag").textContent = flagOf(code);
  save(); renderDyn();
}

function wireEvents(){
  var app=document.getElementById("app");
  app.addEventListener("click", function(e){
    var btn=e.target.closest("[data-act]"); if(!btn) return;
    var act=btn.getAttribute("data-act");
    if(act==="g-first") state.groupResult = state.groupResult==="first"?null:"first";
    else if(act==="g-second") state.groupResult = state.groupResult==="second"?null:"second";
    else if(act==="g-reset") state.groupResult=null;
    else if(act==="pos-1") state.posView=1;
    else if(act==="pos-2") state.posView=2;
    else if(act==="won"){ state.results[btn.getAttribute("data-m")] = state.team; }
    else if(act==="lost"){ state.results[btn.getAttribute("data-m")] = btn.getAttribute("data-opp"); }
    else if(act==="clear"){ delete state.results[btn.getAttribute("data-m")]; }
    else if(act==="toggle-ratings"){ state.openRatings=!state.openRatings; save(); renderPanel();
      var chevs=btn.querySelectorAll(".ic"); if(chevs.length){ var last=chevs[chevs.length-1]; last.classList.toggle("rot", state.openRatings);} return; }
    else if(act==="reset-all"){ state.ratings={}; state.results={}; state.groupResult=null; save(); renderDyn(); renderPanel(); return; }
    save(); renderDyn();
  });
  app.addEventListener("change", function(e){ if(e.target.id==="teamSelect"){ setTeam(e.target.value); } });
  app.addEventListener("input", function(e){ if(e.target.classList && e.target.classList.contains("nw-rat-input")){
    var code=e.target.getAttribute("data-code"); var val=Number(e.target.value);
    if(!isNaN(val)) { state.ratings[code]=val; save(); renderDyn(); } } });
}

/* ---------------- live data (wc-data.json from wc_sync.py) ---------------- */
function loadLive(){
  try{
    fetch(DATA_URL,{cache:"no-store"}).then(function(res){
      if(!res.ok) return null; return res.json();
    }).then(function(d){
      if(!d) return;
      if(d.teams) Object.keys(d.teams).forEach(function(c){
        var t=d.teams[c]; if(typeof t==="number") t={r:t};
        TEAMS[c]=Object.assign({n:c,f:"•",r:1800}, TEAMS[c]||{}, t);
      });
      if(d.groupSeeds) Object.keys(d.groupSeeds).forEach(function(g){ if(d.groupSeeds[g]&&d.groupSeeds[g].length) GROUP_SEEDS[g]=d.groupSeeds[g]; });
      if(d.thirdQual && d.thirdQual.length) THIRD_QUAL=d.thirdQual;
      if(d.thirdByMatch){ var m={}; Object.keys(d.thirdByMatch).forEach(function(k){ m[Number(k)]=d.thirdByMatch[k]; }); attachThirds(m); }
      if(d.results) Object.keys(d.results).forEach(function(k){ if(state.results[k]==null) state.results[k]=d.results[k]; });
      // selected team might have moved position; keep it valid
      var bp=teamGroupPos(state.team); if(bp){ state.posView=bp.pos; } 
      rebuildSelect();
      renderDyn();
      if(state.openRatings) renderPanel();
      var pill=document.getElementById("livePill");
      if(pill && d.asOf){ pill.textContent="● Live · "+d.asOf; pill.style.display="inline-flex"; }
    }).catch(function(){});
  }catch(e){}
}

/* ---------------- boot ---------------- */
load();
(function(){ var bp=teamGroupPos(state.team); if(bp&&bp.pos===3) state.posView=3; })();
buildShell();
document.getElementById("teamSelect").value = state.team;
document.getElementById("brandFlag").textContent = flagOf(state.team);
renderDyn();
renderPanel();
wireEvents();
loadLive();
</script>
</body>
</html>
